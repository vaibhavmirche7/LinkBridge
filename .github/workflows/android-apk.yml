name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission for gradlew
        working-directory: LinkBridge
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: LinkBridge
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LinkBridge
          path: LinkBridge/app/build/outputs/apk/debug/*.apk